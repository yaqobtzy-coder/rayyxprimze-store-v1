<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pembayaran QRIS | RayyxPrimze Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
            color: #ffffff;
            min-height: 100vh;
        }
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
            pointer-events: none;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10,10,30,0.85), rgba(0,0,0,0.92));
            z-index: -1;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .payment-card {
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 32px 28px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            width: 100%;
            text-align: center;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #FFD966, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .logo p {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }
        .status-icon.pending {
            background: #ffc107;
        }
        .status-icon.pending i {
            color: #0a0a1a;
        }
        .status-icon.success {
            background: #28a745;
        }
        .status-icon.success i {
            color: white;
        }
        .status-icon.error {
            background: #dc3545;
        }
        .status-icon.error i {
            color: white;
        }
        .status-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .status-message {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .qris-image {
            width: 100%;
            max-width: 280px;
            margin: 20px auto;
            display: block;
            border-radius: 20px;
            background: white;
            padding: 10px;
        }
        .transaction-details {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
        }
        .transaction-details p {
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .transaction-details .label {
            opacity: 0.6;
        }
        .transaction-details .value {
            font-weight: 600;
            color: #ffd700;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-primary {
            flex: 1;
            padding: 14px;
            background: linear-gradient(95deg, #FFD700, #FF8C00);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: #0a0a1a;
            cursor: pointer;
        }
        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            font-weight: 600;
            color: #ffd700;
            cursor: pointer;
        }
        .btn-cancel {
            width: 100%;
            padding: 14px;
            background: #dc3545;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .countdown {
            font-size: 0.8rem;
            color: #ffc107;
            margin-top: 10px;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,215,0,0.3);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            border-left: 4px solid #ffd700;
        }
        .owner-badge {
            background: linear-gradient(95deg, #FFD700, #FF8C00);
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .error-box {
            background: rgba(220,53,69,0.2);
            border: 1px solid #dc3545;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
        }
        .cat-sewa { background: #2196F3; }
        .cat-script { background: #9C27B0; }
        .cat-panel { background: #FF5722; }
        .cat-digital { background: #4CAF50; }
    </style>
</head>
<body>
    <video id="bgVideo" autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/t8a5ig.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="container">
        <div class="payment-card">
            <div class="logo">
                <h1><i class="fas fa-crown"></i> RayyxPrimze</h1>
                <p>PEMBAYARAN QRIS</p>
            </div>

            <div id="ownerInfo" style="text-align:center;"></div>

            <div id="statusArea">
                <div id="statusIcon" class="status-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div id="statusTitle" class="status-title">Menunggu Pembayaran</div>
                <div id="statusMessage" class="status-message">Silakan scan QRIS di bawah untuk membayar</div>
            </div>

            <div id="qrisArea">
                <img id="qrisImage" class="qris-image" src="" alt="QRIS">
            </div>

            <div id="errorArea" class="error-box" style="display: none;">
                <p><i class="fas fa-exclamation-triangle"></i> <strong>Gagal membuat QRIS</strong></p>
                <p id="errorMessage">Silakan coba lagi atau hubungi admin.</p>
                <button class="btn-secondary" onclick="retryPayment()" style="margin-top:10px;">Coba Lagi</button>
            </div>

            <div id="transactionDetails" class="transaction-details">
                <p><span class="label">Produk:</span> <span id="detailProduct" class="value">-</span></p>
                <p><span class="label">Kategori:</span> <span id="detailCategory" class="value">-</span></p>
                <p><span class="label">Total Bayar:</span> <span id="detailAmount" class="value">Rp 0</span></p>
                <p><span class="label">ID Transaksi:</span> <span id="detailTransactionId" class="value">-</span></p>
                <p><span class="label">Tanggal:</span> <span id="detailDate" class="value">-</span></p>
                <p><span class="label">Status:</span> <span id="detailStatus" class="value">Menunggu Pembayaran</span></p>
            </div>

            <div id="countdownArea" class="countdown"></div>

            <div class="btn-group">
                <button id="checkStatusBtn" class="btn-primary" onclick="checkPaymentStatus()">
                    <i class="fas fa-sync-alt"></i> Cek Status
                </button>
                <button class="btn-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
            </div>
            <button id="cancelBtn" class="btn-cancel" onclick="cancelPayment()">
                <i class="fas fa-times"></i> Batalkan Pesanan
            </button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:20px;">Memproses...</p>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBUHSGJ2Yaet7ue1x8WLcHn6LI627SINqg",
            authDomain: "rayy-digital-store.firebaseapp.com",
            databaseURL: "https://rayy-digital-store-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rayy-digital-store",
            storageBucket: "rayy-digital-store.firebasestorage.app",
            messagingSenderId: "537690791174",
            appId: "1:537690791174:web:c29f7cdfcae0506b6e1287"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ZAKI STORE API
        const ZAKI_API_URL = 'https://qris.zakki.store/topup';
        const ZAKI_CHECK_URL = 'https://qris.zakki.store/cektopup';
        const ZAKI_TOKEN = '13db95d8e39ea2';

        // TELEGRAM BOT
        const TELEGRAM_BOT_TOKEN = '8352764997:AAEP5JE2llOvuoNFoJvDlATOl2Mrzo4VZ-M';
        const TELEGRAM_CHAT_ID = '7966336512';

        async function sendToTelegram(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (error) { console.error('Telegram error:', error); }
        }

        let orderData = null;
        let sewaData = null;
        let scriptData = null;
        let panelData = null;
        let paymentType = null;
        let pendingTransaction = null;
        let checkInterval = null;
        let isSuccess = false;
        let isOwner = false;
        let productLinkDownload = null;

        async function checkOwner() {
            const userId = localStorage.getItem("currentUserId");
            if (userId) {
                const userRef = database.ref(`users/${userId}`);
                const snapshot = await userRef.once('value');
                if (snapshot.exists() && snapshot.val().role === 'owner') {
                    isOwner = true;
                    document.getElementById('ownerInfo').innerHTML = '<span class="owner-badge"><i class="fas fa-crown"></i> OWNER MODE - GRATIS</span>';
                    setTimeout(() => {
                        processSuccessOwner();
                    }, 1000);
                }
            }
        }

        async function processSuccessOwner() {
            if (isSuccess) return;
            isSuccess = true;
            
            const transactionId = 'OWNER_' + Date.now();
            
            // Kurangi stok produk
            if (orderData && orderData.productId) {
                const productRef = database.ref(`products/${orderData.productId}`);
                const productSnap = await productRef.once('value');
                const product = productSnap.val();
                if (product && product.stock > 0) {
                    await productRef.update({ stock: product.stock - 1 });
                }
            }
            
            // Simpan ke database sesuai kategori
            if (paymentType === 'sewa' && sewaData) {
                await database.ref('sewa_orders').push({
                    ...sewaData,
                    transactionId: transactionId,
                    status: 'pending',
                    paymentStatus: 'success',
                    createdAt: new Date().toISOString()
                });
                
                const telegramMessage = `🔔 *PESANAN SEWA (OWNER MODE)* 🔔\n\n👤 *Username:* ${orderData.username}\n📦 *Produk:* ${orderData.productName}\n💰 *Harga:* Rp ${orderData.productPrice}\n📱 *No WA:* ${sewaData.waNumber}\n🔗 *Link Group:* ${sewaData.waLink}\n🆔 *ID Transaksi:* ${transactionId}`;
                await sendToTelegram(telegramMessage);
                
            } else if (paymentType === 'script' && scriptData) {
                await database.ref('script_orders').push({
                    ...scriptData,
                    transactionId: transactionId,
                    status: 'success',
                    createdAt: new Date().toISOString()
                });
                
                if (productLinkDownload) {
                    window.open(productLinkDownload, '_blank');
                }
                
            } else if (paymentType === 'panel' && panelData) {
                await database.ref('panel_orders').push({
                    ...panelData,
                    transactionId: transactionId,
                    status: 'paid',
                    paymentStatus: 'success',
                    createdAt: new Date().toISOString()
                });
                
                const telegramMessage = `🖥️ *PESANAN PANEL (OWNER MODE)* 🖥️\n\n👤 *Username:* ${orderData.username}\n📦 *Produk:* ${orderData.productName}\n💰 *Harga:* Rp ${orderData.productPrice}\n🖥️ *Nama Panel:* ${panelData.panelName}\n👤 *User Panel:* ${panelData.panelUsername}\n📱 *WA:* ${panelData.waNumber}\n🆔 *ID Transaksi:* ${transactionId}`;
                await sendToTelegram(telegramMessage);
                
            } else if (paymentType === 'digital') {
                await database.ref('digital_orders').push({
                    productId: orderData.productId,
                    productName: orderData.productName,
                    productPrice: orderData.productPrice,
                    linkDownload: productLinkDownload,
                    userId: orderData.userId,
                    username: orderData.username,
                    transactionId: transactionId,
                    status: 'success',
                    createdAt: new Date().toISOString()
                });
                
                if (productLinkDownload) {
                    window.open(productLinkDownload, '_blank');
                }
            }
            
            // Redirect ke halaman sukses
            localStorage.setItem('lastTransactionId', transactionId);
            localStorage.setItem('lastProductName', orderData.productName);
            localStorage.setItem('lastAmount', orderData.productPrice);
            localStorage.setItem('lastCategory', paymentType);
            
            window.location.href = `susces.html?type=${paymentType}&id=${transactionId}&product=${encodeURIComponent(orderData.productName)}&amount=${orderData.productPrice}`;
        }

        function loadData() {
            const pendingOrder = localStorage.getItem('pendingOrder');
            const pendingSewa = localStorage.getItem('sewaData');
            const pendingScript = localStorage.getItem('scriptData');
            const pendingPanel = localStorage.getItem('panelData');
            const urlParams = new URLSearchParams(window.location.search);
            
            if (pendingOrder) {
                orderData = JSON.parse(pendingOrder);
                paymentType = urlParams.get('type') || orderData.category;
                productLinkDownload = orderData.linkDownload;
            }
            
            if (pendingSewa) {
                sewaData = JSON.parse(pendingSewa);
            }
            
            if (pendingScript) {
                scriptData = JSON.parse(pendingScript);
            }
            
            if (pendingPanel) {
                panelData = JSON.parse(pendingPanel);
            }
            
            if (!orderData) {
                showToast("Data pesanan tidak ditemukan!");
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return;
            }
            
            // Tampilkan detail produk dengan badge kategori
            let categoryBadge = '';
            if (paymentType === 'sewa') categoryBadge = '<span class="category-badge cat-sewa">SEWA BOT</span>';
            else if (paymentType === 'script') categoryBadge = '<span class="category-badge cat-script">SCRIPT</span>';
            else if (paymentType === 'panel') categoryBadge = '<span class="category-badge cat-panel">PANEL HOSTING</span>';
            else if (paymentType === 'digital') categoryBadge = '<span class="category-badge cat-digital">PRODUK DIGITAL</span>';
            
            document.getElementById('detailProduct').innerHTML = `${escapeHtml(orderData.productName)} ${categoryBadge}`;
            document.getElementById('detailCategory').innerHTML = paymentType.toUpperCase();
            document.getElementById('detailAmount').innerText = 'Rp ' + orderData.productPrice.toLocaleString();
            document.getElementById('detailDate').innerText = new Date().toLocaleString();
        }

        async function createPayment() {
            if (isOwner) return;
            
            showLoading();
            try {
                const response = await fetch(ZAKI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: ZAKI_TOKEN, nominal: orderData.productPrice })
                });
                
                const result = await response.json();
                hideLoading();
                
                if (result.code === 201 && result.status === "success") {
                    pendingTransaction = result.data;
                    
                    if (pendingTransaction.qris_image) {
                        document.getElementById('qrisImage').src = pendingTransaction.qris_image;
                        document.getElementById('qrisArea').style.display = 'block';
                        document.getElementById('errorArea').style.display = 'none';
                    }
                    
                    document.getElementById('detailTransactionId').innerText = pendingTransaction.id_transaksi;
                    startAutoCheck();
                    
                    if (pendingTransaction.expired_at) {
                        const expiredTime = new Date(pendingTransaction.expired_at);
                        startCountdown(expiredTime);
                    }
                } else {
                    showError("Gagal membuat QRIS: " + (result.message || "Silakan coba lagi"));
                }
            } catch (error) {
                hideLoading();
                console.error('Error creating payment:', error);
                showError("Network error! Periksa koneksi internet Anda.");
            }
        }

        function showError(msg) {
            document.getElementById('qrisArea').style.display = 'none';
            document.getElementById('errorArea').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = msg;
            document.getElementById('statusIcon').classList.remove('pending');
            document.getElementById('statusIcon').classList.add('error');
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-times"></i>';
            document.getElementById('statusTitle').innerText = 'Gagal Membuat Pembayaran';
            document.getElementById('statusMessage').innerText = msg;
        }

        function retryPayment() {
            document.getElementById('errorArea').style.display = 'none';
            document.getElementById('statusIcon').classList.remove('error');
            document.getElementById('statusIcon').classList.add('pending');
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-clock"></i>';
            document.getElementById('statusTitle').innerText = 'Menunggu Pembayaran';
            document.getElementById('statusMessage').innerText = 'Silakan scan QRIS di bawah untuk membayar';
            createPayment();
        }

        function startAutoCheck() {
            if (checkInterval) clearInterval(checkInterval);
            let checkCount = 0;
            checkInterval = setInterval(async () => {
                checkCount++;
                if (checkCount > 24 || isSuccess) {
                    if (checkCount > 24) {
                        clearInterval(checkInterval);
                        showToast("⏰ Waktu cek otomatis habis. Silakan cek manual.");
                    }
                    return;
                }
                await autoCheckStatus();
            }, 5000);
        }

        async function autoCheckStatus() {
            if (!pendingTransaction || !pendingTransaction.id_transaksi || isSuccess) return;
            
            try {
                const response = await fetch(`${ZAKI_CHECK_URL}?idtopup=${pendingTransaction.id_transaksi}`);
                const result = await response.json();
                
                if (result.code === 200 && result.kategori_status === "SUCCESS") {
                    clearInterval(checkInterval);
                    await processSuccess();
                }
            } catch (error) {
                console.error("Auto check error:", error);
            }
        }

        async function checkPaymentStatus() {
            if (!pendingTransaction || !pendingTransaction.id_transaksi) {
                showToast("Tidak ada transaksi pending!");
                return;
            }
            
            showLoading();
            try {
                const response = await fetch(`${ZAKI_CHECK_URL}?idtopup=${pendingTransaction.id_transaksi}`);
                const result = await response.json();
                hideLoading();
                
                if (result.code === 200 && result.kategori_status === "SUCCESS") {
                    if (checkInterval) clearInterval(checkInterval);
                    await processSuccess();
                } else if (result.kategori_status === "PENDING") {
                    showToast("⏳ Pembayaran masih pending. Silakan selesaikan pembayaran.");
                } else {
                    showToast("❌ Pembayaran belum terdeteksi. Silakan scan QRIS dan bayar.");
                }
            } catch (error) {
                hideLoading();
                showToast("Error mengecek status pembayaran!");
            }
        }

        async function processSuccess() {
            if (isSuccess) return;
            isSuccess = true;
            
            const statusIcon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');
            
            statusIcon.classList.remove('pending');
            statusIcon.classList.add('success');
            statusIcon.innerHTML = '<i class="fas fa-check"></i>';
            statusTitle.innerText = 'Pembayaran Berhasil!';
            statusMessage.innerText = 'Terima kasih, pembayaran Anda telah dikonfirmasi.';
            document.getElementById('detailStatus').innerHTML = '<span style="color:#28a745;">✓ BERHASIL</span>';
            document.getElementById('qrisArea').classList.add('hidden');
            
            // Kurangi stok produk
            if (orderData && orderData.productId) {
                const productRef = database.ref(`products/${orderData.productId}`);
                const productSnap = await productRef.once('value');
                const product = productSnap.val();
                if (product && product.stock > 0) {
                    await productRef.update({ stock: product.stock - 1 });
                }
            }
            
            // Simpan ke riwayat transaksi
            const historyRef = database.ref(`transactions/${orderData.userId}`);
            await historyRef.push({
                productName: orderData.productName,
                amount: orderData.productPrice,
                transactionId: pendingTransaction.id_transaksi,
                status: 'success',
                timestamp: Date.now(),
                category: paymentType
            });
            
            // Tambah koin
            const koinDidapat = Math.floor(orderData.productPrice / 100);
            const userRef = database.ref(`users/${orderData.userId}`);
            const userSnap = await userRef.once('value');
            const currentKoin = userSnap.val()?.koin || 0;
            await userRef.update({ koin: currentKoin + koinDidapat });
            
            // ==================== PROSES BERDASARKAN KATEGORI ====================
            
            // 1. SEWA BOT
            if (paymentType === 'sewa' && sewaData) {
                await database.ref('sewa_orders').push({
                    ...sewaData,
                    transactionId: pendingTransaction.id_transaksi,
                    amount: orderData.productPrice,
                    status: 'pending',
                    paymentStatus: 'success',
                    createdAt: new Date().toISOString()
                });
                
                const telegramMessage = `🔔 *PESANAN SEWA BERHASIL* 🔔\n\n👤 *Username:* ${orderData.username}\n📦 *Produk:* ${orderData.productName}\n💰 *Harga:* Rp ${orderData.productPrice}\n📱 *No WA:* ${sewaData.waNumber}\n🔗 *Link Group:* ${sewaData.waLink}\n🆔 *ID Transaksi:* ${pendingTransaction.id_transaksi}\n⏰ *Waktu:* ${new Date().toLocaleString()}`;
                await sendToTelegram(telegramMessage);
                
                statusMessage.innerText = 'Pembayaran berhasil! Menunggu konfirmasi dari admin.';
                
                setTimeout(() => {
                    window.location.href = `susces.html?type=sewa&id=${pendingTransaction.id_transaksi}&product=${encodeURIComponent(orderData.productName)}&amount=${orderData.productPrice}`;
                }, 2000);
            }
            
            // 2. SCRIPT
            else if (paymentType === 'script') {
                if (scriptData) {
                    await database.ref('script_orders').push({
                        ...scriptData,
                        transactionId: pendingTransaction.id_transaksi,
                        status: 'success',
                        paymentStatus: 'success',
                        createdAt: new Date().toISOString()
                    });
                }
                
                statusMessage.innerText = 'Pembayaran berhasil! Mengarahkan ke link download...';
                
                if (productLinkDownload) {
                    window.open(productLinkDownload, '_blank');
                }
                
                setTimeout(() => {
                    window.location.href = `susces.html?type=script&id=${pendingTransaction.id_transaksi}&product=${encodeURIComponent(orderData.productName)}&amount=${orderData.productPrice}`;
                }, 2000);
            }
            
            // 3. PANEL HOSTING
            else if (paymentType === 'panel' && panelData) {
                await database.ref('panel_orders').push({
                    ...panelData,
                    transactionId: pendingTransaction.id_transaksi,
                    status: 'paid',
                    paymentStatus: 'success',
                    createdAt: new Date().toISOString()
                });
                
                const telegramMessage = `🖥️ *PESANAN PANEL HOSTING* 🖥️\n\n👤 *Username:* ${orderData.username}\n📦 *Produk:* ${orderData.productName}\n💰 *Harga:* Rp ${orderData.productPrice}\n🖥️ *Nama Panel:* ${panelData.panelName}\n👤 *User Panel:* ${panelData.panelUsername}\n📱 *WA:* ${panelData.waNumber}\n📝 *Catatan:* ${panelData.notes || '-'}\n🆔 *ID Transaksi:* ${pendingTransaction.id_transaksi}`;
                await sendToTelegram(telegramMessage);
                
                statusMessage.innerText = 'Pembayaran berhasil! Admin akan segera membuatkan panel Anda. Data panel akan muncul di menu "Data Panel Saya".';
                
                setTimeout(() => {
                    window.location.href = `susces.html?type=panel&id=${pendingTransaction.id_transaksi}&product=${encodeURIComponent(orderData.productName)}&amount=${orderData.productPrice}`;
                }, 3000);
            }
            
            // 4. PRODUK DIGITAL
            else if (paymentType === 'digital') {
                await database.ref('digital_orders').push({
                    productId: orderData.productId,
                    productName: orderData.productName,
                    productPrice: orderData.productPrice,
                    linkDownload: productLinkDownload,
                    userId: orderData.userId,
                    username: orderData.username,
                    transactionId: pendingTransaction.id_transaksi,
                    status: 'success',
                    createdAt: new Date().toISOString()
                });
                
                statusMessage.innerText = 'Pembayaran berhasil! Mengarahkan ke link download...';
                
                if (productLinkDownload) {
                    window.open(productLinkDownload, '_blank');
                }
                
                setTimeout(() => {
                    window.location.href = `susces.html?type=digital&id=${pendingTransaction.id_transaksi}&product=${encodeURIComponent(orderData.productName)}&amount=${orderData.productPrice}`;
                }, 2000);
            }
        }

        function startCountdown(expiredTime) {
            const countdownArea = document.getElementById('countdownArea');
            const interval = setInterval(() => {
                const now = new Date();
                const diff = expiredTime - now;
                
                if (diff <= 0) {
                    clearInterval(interval);
                    countdownArea.innerHTML = '<i class="fas fa-clock"></i> QRIS telah kadaluarsa. Silakan buat pesanan baru.';
                } else {
                    const minutes = Math.floor(diff / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    countdownArea.innerHTML = `<i class="fas fa-hourglass-half"></i> Sisa waktu: ${minutes}m ${seconds}s`;
                }
            }, 1000);
        }

        function showToast(msg) {
            let existing = document.querySelector('.toast');
            if (existing) existing.remove();
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        function cancelPayment() {
            if (confirm("Batalkan pesanan?")) {
                if (checkInterval) clearInterval(checkInterval);
                localStorage.removeItem('pendingOrder');
                localStorage.removeItem('sewaData');
                localStorage.removeItem('scriptData');
                localStorage.removeItem('panelData');
                window.location.href = 'index.html';
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        window.checkPaymentStatus = checkPaymentStatus;
        window.cancelPayment = cancelPayment;
        window.goBack = goBack;
        window.retryPayment = retryPayment;

        // INIT
        checkOwner();
        loadData();
        if (!isOwner) {
            createPayment();
        }
    </script>
</body>
</html>
